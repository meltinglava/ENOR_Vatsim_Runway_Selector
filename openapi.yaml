openapi: 3.1.0
info:
  title: Runway Plugin API
  description: |
    Two HTTP APIs used by the es_runway_selector plugin system.

    **Plugin API** — your plugin must implement these endpoints.
    `es_runway_selector` spawns your binary with `--port N --helpers-port M`,
    waits for `/health` to return 200, then POST to `/runway-selections` once per run.

    **Helpers API** — hosted by `es_runway_selector` on the port passed as `--helpers-port`.
    Call these from your plugin to use built-in runway selection algorithms.
  contact:
    name: meltinglava
  license:
    name: MIT OR Apache-2.0
    identifier: MIT OR Apache-2.0
  version: '1'
paths:
  /health:
    get:
      tags:
      - Plugin API
      summary: Health check — return 200 to indicate the plugin is ready to accept requests.
      operationId: plugin_health
      responses:
        '200':
          description: Plugin is ready
  /helpers/best-headwind:
    post:
      tags:
      - Helpers API
      summary: Return the runway with the greatest headwind advantage.
      description: |-
        The winner must beat the runner-up by strictly more than `advantage_threshold_kt`.
        Returns `null` when no runway has METAR wind data or no clear winner exists.
      operationId: handle_best_headwind
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BestHeadwindRequest'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunwayResult'
  /helpers/min-crosswind:
    post:
      tags:
      - Helpers API
      summary: Return the runway with the smallest crosswind component.
      description: Returns `null` when no runway has METAR wind data.
      operationId: handle_min_crosswind
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MinCrosswindRequest'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunwayResult'
  /helpers/prefer-unless-crosswind:
    post:
      tags:
      - Helpers API
      summary: Return `preferred_id` unless its crosswind exceeds `max_crosswind_kt`.
      description: |-
        Falls back to `best_headwind` (threshold = 0) when the preferred runway is unsuitable.
        Returns `null` when no METAR wind data is available.
      operationId: handle_prefer_unless_crosswind
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreferUnlessCrosswindRequest'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunwayResult'
  /helpers/prefer-unless-tailwind:
    post:
      tags:
      - Helpers API
      summary: Return `preferred_id` unless its tailwind exceeds `max_tailwind_kt`.
      description: |-
        Falls back to `best_headwind` (threshold = 0) when the preferred runway is unsuitable.
        Returns `null` when no METAR wind data is available.
      operationId: handle_prefer_unless_tailwind
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreferUnlessTailwindRequest'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunwayResult'
  /helpers/within-crosswind-limit:
    post:
      tags:
      - Helpers API
      summary: Return all runways whose crosswind is at or below `max_kt`.
      operationId: handle_within_crosswind_limit
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WithinCrosswindLimitRequest'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunwaysResult'
  /runway-selections:
    post:
      tags:
      - Plugin API
      summary: Batch runway selection.
      description: |-
        `es_runway_selector` sends all airports in a single request.
        Return `handled: true` with `runway_uses` for airports you manage;
        return `handled: false` to let es_runway_selector apply its own fallback.
      operationId: plugin_runway_selections
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunwaySelectionsRequest'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunwaySelectionsResponse'
components:
  schemas:
    AirportSelectionRequest:
      type: object
      description: Per-airport data sent to the plugin.
      required:
      - icao
      - runways
      - timestamp_utc
      properties:
        icao:
          type: string
          description: ICAO airport identifier, e.g. "ENGM"
        metar:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/MetarData'
            description: METAR data, if available.
        runways:
          type: array
          items:
            $ref: '#/components/schemas/RunwayInfo'
          description: All runway directions at this airport with pre-computed wind components.
        timestamp_utc:
          type: string
          description: Current UTC time as an RFC 3339 string, e.g. "2026-05-14T10:20:00Z"
    AirportSelectionResult:
      type: object
      description: Per-airport result from the plugin.
      required:
      - icao
      - handled
      properties:
        handled:
          type: boolean
          description: |-
            `true` if the plugin is handling this airport.
            `false` means the caller should use its own fallback logic.
        icao:
          type: string
        runway_uses:
          type: array
          items:
            $ref: '#/components/schemas/RunwayUseEntry'
          description: Non-empty only when `handled` is `true`.
    BestHeadwindRequest:
      type: object
      required:
      - runways
      - advantage_threshold_kt
      properties:
        advantage_threshold_kt:
          type: integer
          format: int32
          description: |-
            Minimum headwind advantage over the runner-up required to declare a winner.
            Use `0` to always pick the leader when any advantage exists.
        runways:
          type: array
          items:
            $ref: '#/components/schemas/RunwayInfo'
    CloudCoverage:
      type: string
      enum:
      - Few
      - Scattered
      - Broken
      - Overcast
    CloudData:
      type: object
      properties:
        cloud_type:
          type:
          - string
          - 'null'
          description: Cloud type, e.g. "CB", "TCU". `None` if not reported or unreadable.
        coverage:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/CloudCoverage'
            description: Cloud coverage. `None` if unreadable (reported as ///).
        height_hundreds_ft:
          type:
          - integer
          - 'null'
          format: int32
          description: Cloud base in hundreds of feet. `None` if unreadable (reported as ///).
    CrosswindDirection:
      type: string
      enum:
      - Left
      - Right
      - Variable
    MetarData:
      type: object
      description: 'METAR data: raw string plus optionally parsed fields.'
      required:
      - raw
      properties:
        parsed:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/ParsedMetar'
        raw:
          type: string
    MinCrosswindRequest:
      type: object
      required:
      - runways
      properties:
        runways:
          type: array
          items:
            $ref: '#/components/schemas/RunwayInfo'
    ParsedMetar:
      type: object
      description: Structured METAR content.
      required:
      - is_cavok
      properties:
        clouds:
          type: array
          items:
            $ref: '#/components/schemas/CloudData'
        dew_point_c:
          type:
          - integer
          - 'null'
          format: int32
          description: Dew point in °C. `None` if not reported or unreadable.
        is_cavok:
          type: boolean
          description: True if METAR reports CAVOK (no significant weather, visibility > 10 km).
        qnh_hpa:
          type:
          - integer
          - 'null'
          format: int32
          description: QNH in hPa. `None` if not reported or unreadable.
          minimum: 0
        rvr:
          type: array
          items:
            $ref: '#/components/schemas/RvrData'
        temperature_c:
          type:
          - integer
          - 'null'
          format: int32
          description: Temperature in °C. `None` if not reported or unreadable.
        vertical_visibility_hundreds_ft:
          type:
          - integer
          - 'null'
          format: int32
          description: |-
            Vertical visibility in hundreds of feet. `None` if VV not reported.
            A value of 0 means VV was reported but the height was unreadable (VV///).
        visibility_meters:
          type:
          - integer
          - 'null'
          format: int32
          description: Prevailing visibility in metres. `None` if CAVOK or not reported.
          minimum: 0
        weather_phenomena:
          type: array
          items:
            $ref: '#/components/schemas/WeatherPhenomenonData'
        wind:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/WindData'
    PreferUnlessCrosswindRequest:
      type: object
      required:
      - runways
      - preferred_id
      - max_crosswind_kt
      properties:
        max_crosswind_kt:
          type: integer
          format: int32
          description: Switch away from the preferred runway when its crosswind exceeds this.
        preferred_id:
          type: string
          description: Identifier of the preferred runway (e.g. `"27"`).
        runways:
          type: array
          items:
            $ref: '#/components/schemas/RunwayInfo'
    PreferUnlessTailwindRequest:
      type: object
      required:
      - runways
      - preferred_id
      - max_tailwind_kt
      properties:
        max_tailwind_kt:
          type: integer
          format: int32
          description: Switch away from the preferred runway when its tailwind exceeds this.
        preferred_id:
          type: string
          description: Identifier of the preferred runway (e.g. `"18"`).
        runways:
          type: array
          items:
            $ref: '#/components/schemas/RunwayInfo'
    RunwayInfo:
      type: object
      description: |-
        A single runway direction with pre-computed wind components from the current METAR.

        Wind components are `None` when no METAR is available.
      required:
      - identifier
      - heading
      properties:
        crosswind_direction:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/CrosswindDirection'
            description: Direction the crosswind comes from relative to the runway centerline.
        crosswind_kt:
          type:
          - integer
          - 'null'
          format: int32
          description: Max crosswind magnitude in knots (always ≥ 0). `None` if no METAR.
        heading:
          type: integer
          format: int32
          description: Runway heading in degrees true (0–359)
          minimum: 0
        headwind_kt:
          type:
          - integer
          - 'null'
          format: int32
          description: Max headwind in knots. Positive = headwind, negative = tailwind. `None` if no METAR.
        identifier:
          type: string
          description: Runway identifier, e.g. "01L", "19R", "18"
        tailwind_kt:
          type:
          - integer
          - 'null'
          format: int32
          description: Max tailwind in knots (always ≥ 0). `None` if no METAR.
    RunwayResult:
      type: object
      description: Single-runway result — `runway` is `null` when no runway qualifies.
      properties:
        runway:
          type:
          - string
          - 'null'
    RunwaySelectionsRequest:
      type: object
      description: Batch request for runway selections sent to the plugin.
      required:
      - airports
      properties:
        airports:
          type: array
          items:
            $ref: '#/components/schemas/AirportSelectionRequest'
    RunwaySelectionsResponse:
      type: object
      description: Plugin response for all airports in the batch.
      required:
      - results
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/AirportSelectionResult'
    RunwayUse:
      type: string
      enum:
      - Departing
      - Arriving
      - Both
    RunwayUseEntry:
      type: object
      required:
      - runway
      - use
      properties:
        runway:
          type: string
          description: Runway identifier, e.g. "01L"
        use:
          $ref: '#/components/schemas/RunwayUse'
    RunwaysResult:
      type: object
      description: Multi-runway result.
      required:
      - runways
      properties:
        runways:
          type: array
          items:
            type: string
    RvrData:
      type: object
      required:
      - runway
      properties:
        meters:
          type:
          - integer
          - 'null'
          format: int32
          description: RVR value in metres. `None` if unreadable (reported as /////).
          minimum: 0
        runway:
          type: string
          description: Runway designator, e.g. "28L"
    WeatherDescriptor:
      type: string
      enum:
      - Shallow
      - Partial
      - Patches
      - LowDrifting
      - Blowing
      - Shower
      - Thunderstorm
      - Freezing
    WeatherIntensity:
      type: string
      enum:
      - Light
      - Heavy
      - Vicinity
    WeatherPhenomenonData:
      type: object
      properties:
        descriptors:
          type: array
          items:
            $ref: '#/components/schemas/WeatherDescriptor'
        intensity:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/WeatherIntensity'
        phenomena:
          type: array
          items:
            type: string
          description: 'METAR weather codes: "DZ", "RA", "SN", "FG", etc.'
    WindData:
      type: object
      required:
      - is_variable
      - speed_kt
      properties:
        direction_degrees:
          type:
          - integer
          - 'null'
          format: int32
          description: Wind direction in degrees true (0–359). `None` if variable or unreadable.
          minimum: 0
        gust_kt:
          type:
          - integer
          - 'null'
          format: int32
          description: Gust speed in knots, if reported.
          minimum: 0
        is_variable:
          type: boolean
          description: True when direction is explicitly reported as variable (VRB).
        speed_kt:
          type: integer
          format: int32
          description: Wind speed in knots.
          minimum: 0
        variable_from_degrees:
          type:
          - integer
          - 'null'
          format: int32
          description: Start of variable wind range, e.g. 250 in "250V310".
          minimum: 0
        variable_to_degrees:
          type:
          - integer
          - 'null'
          format: int32
          description: End of variable wind range, e.g. 310 in "250V310".
          minimum: 0
    WithinCrosswindLimitRequest:
      type: object
      required:
      - runways
      - max_kt
      properties:
        max_kt:
          type: integer
          format: int32
        runways:
          type: array
          items:
            $ref: '#/components/schemas/RunwayInfo'
tags:
- name: Plugin API
  description: Endpoints your plugin must implement
- name: Helpers API
  description: Endpoints hosted by es_runway_selector for plugins to call
