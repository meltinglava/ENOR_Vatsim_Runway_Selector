# ENOR area configuration. End users override values in `area.local.toml`
# (sparse — only fields you change need to appear).

metar_urls = ["https://metar.vatsim.net/EN", "https://metar.vatsim.net/ESKS"]
time_zone = "Europe/Oslo"
sector_file_prefix = "ENOR"

ignore_airports = [
  "ENAE", "ENAS", "ENAX", "ENBB", "ENBM", "ENDI", "ENDO", "ENEG", "ENEN",
  "ENFG", "ENFY", "ENGK", "ENGN", "ENGS", "ENHA", "ENHS", "ENHT", "ENJA",
  "ENJB", "ENKJ", "ENKL", "ENLB", "ENLI", "ENLU", "ENLV", "ENMO", "ENOP",
  "ENRE", "ENRG", "ENRI", "ENRK", "ENSI", "ENSN", "ENSU", "ENTS", "ENTY",
  "ENUL", "ENVE",
  "ENQC", # bad autometars
  "ENQR", # bad autometars
  "ENOA", # writes qnh without Q in metar
]

[default_runways]
ENAL = 24
ENAN = 14
ENAT = 11
