syntax = "proto3";

package runway_selector.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

// =============================================================================
// Service
// =============================================================================

// RunwaySelector is the gRPC service every area plugin implements.
//
// The host (es_runway_selector) launches the plugin as a subprocess, polls the
// standard grpc.health.v1.Health service for readiness, then calls these RPCs.
service RunwaySelector {
  // Returns the list of ICAO codes this plugin claims responsibility for.
  // Called once after the plugin reports healthy.
  rpc GetAirports(google.protobuf.Empty) returns (GetAirportsResponse);

  // Returns runway selections for the requested airports.
  // The host only includes airports that appeared in GetAirportsResponse.
  rpc SelectRunways(SelectRunwaysRequest) returns (SelectRunwaysResponse);
}

// =============================================================================
// GetAirports
// =============================================================================

message GetAirportsResponse {
  // ICAO codes the plugin handles. Order is not significant.
  repeated string icaos = 1;
}

// =============================================================================
// SelectRunways
// =============================================================================

message SelectRunwaysRequest {
  // Current wall-clock time in UTC at the moment the host issued the request.
  google.protobuf.Timestamp now_utc = 1;

  // IANA timezone for the area (e.g. "Europe/Oslo"). Use this for any
  // time-of-day rules (LVP windows, segregated/mixed modes, etc.).
  string area_timezone = 2;

  // Airports to evaluate. The host has already filtered to those the plugin
  // claimed in GetAirports.
  repeated AirportRequest airports = 3;
}

message AirportRequest {
  string icao = 1;

  // All runway directions at this airport.
  repeated RunwayInfo runways = 2;

  // Current METAR for this airport. Absent if no METAR was available.
  optional Metar metar = 3;

  // ATIS-derived runway assignments parsed by the host. Empty if no ATIS or
  // the ATIS did not name a runway.
  //
  // Plugins may either pass these through (returning source = ATIS) or
  // override them based on area-specific rules.
  repeated RunwayAssignment atis_runways = 4;
}

message RunwayInfo {
  // Runway direction identifier, e.g. "01L", "19R", "18".
  string identifier = 1;

  // True heading in degrees (0–359).
  uint32 heading_degrees_true = 2;

  // Pre-computed wind components for this direction.
  // Absent if no METAR or no usable wind data.
  optional WindComponents wind_components = 3;
}

message WindComponents {
  // Positive = headwind. Negative = tailwind. Knots.
  sint32 headwind_kt = 1;
  // Magnitude only (always >= 0). Knots.
  uint32 crosswind_kt = 2;
  // Side the crosswind blows from, relative to the runway centerline.
  CrosswindDirection crosswind_direction = 3;
}

enum CrosswindDirection {
  CROSSWIND_DIRECTION_UNSPECIFIED = 0;
  CROSSWIND_DIRECTION_LEFT = 1;
  CROSSWIND_DIRECTION_RIGHT = 2;
  CROSSWIND_DIRECTION_VARIABLE = 3;
}

message SelectRunwaysResponse {
  // One entry per airport for which the plugin produced a selection.
  // Airports the plugin chose not to handle this cycle may be omitted.
  repeated AirportSelection selections = 1;
}

message AirportSelection {
  string icao = 1;
  // Source the plugin attributes this selection to. The host uses this to
  // populate the runway-source priority table (ATIS > METAR > DEFAULT).
  SelectionSource source = 2;
  // One or more runway assignments. Empty means "no selection this cycle".
  repeated RunwayAssignment runways = 3;
}

message RunwayAssignment {
  // Runway direction identifier, must match one of the RunwayInfo identifiers
  // from the request.
  string identifier = 1;
  RunwayUse use = 2;
}

enum RunwayUse {
  RUNWAY_USE_UNSPECIFIED = 0;
  RUNWAY_USE_DEPARTING = 1;
  RUNWAY_USE_ARRIVING = 2;
  RUNWAY_USE_BOTH = 3;
}

enum SelectionSource {
  SELECTION_SOURCE_UNSPECIFIED = 0;
  SELECTION_SOURCE_ATIS = 1;
  SELECTION_SOURCE_METAR = 2;
  SELECTION_SOURCE_DEFAULT = 3;
}

// =============================================================================
// Parsed METAR
// =============================================================================
//
// Convention for METAR "present-but-unknown" fields (rendered as "////" in
// the raw report): an `optional` scalar field is unset to mean unknown, set
// to mean known. The enclosing message's optionality / presence indicates
// whether the surrounding feature appeared at all.

message Metar {
  // Raw METAR text as received from the source.
  string raw = 1;
  // ICAO airport identifier.
  string icao = 2;
  // Observation time resolved to a full UTC instant.
  google.protobuf.Timestamp observation_time = 3;

  bool corrected = 4;  // "COR" was present
  bool auto = 5;       // "AUTO" was present
  bool nosig = 6;      // "NOSIG" was present (no significant change expected)

  Wind wind = 7;
  Obscuration obscuration = 8;
  Temperature temperature = 9;
  Pressure pressure = 10;

  // Recent weather phenomena (the "RE.." section).
  repeated PresentWeather recent_weather = 11;

  // Trailing remarks (the "RMK ..." section), if any.
  optional string remarks = 12;
}

// ─── Wind ────────────────────────────────────────────────────────────────────

message Wind {
  oneof direction {
    // Wind direction reported as a heading in degrees.
    OptionalDegrees heading = 1;
    // Wind reported as variable ("VRB").
    google.protobuf.Empty variable = 2;
  }
  // Sustained wind speed.
  OptionalVelocity speed = 3;
  // Gust speed, if reported (the "G..." suffix).
  optional OptionalVelocity gust = 4;
  // Wind direction variation range (the "250V310" suffix), if reported.
  optional WindVariation variation = 5;
}

message WindVariation {
  OptionalDegrees from = 1;
  OptionalDegrees to = 2;
}

// A direction in degrees (0–360). Set = known value. Unset = "///".
message OptionalDegrees {
  optional uint32 degrees = 1;
}

enum VelocityUnit {
  VELOCITY_UNIT_UNSPECIFIED = 0;
  VELOCITY_UNIT_KNOTS = 1;
  VELOCITY_UNIT_METERS_PER_SECOND = 2;
}

// A speed magnitude. Set = known value (including 0 for calm). Unset = "//".
message OptionalVelocity {
  optional uint32 value = 1;
  VelocityUnit unit = 2;
}

// ─── Obscuration ─────────────────────────────────────────────────────────────

message Obscuration {
  oneof variant {
    // CAVOK was reported (no significant clouds, visibility > 10 km, no
    // significant weather).
    google.protobuf.Empty cavok = 1;
    // Full described obscuration block.
    DescribedObscuration described = 2;
  }
}

message DescribedObscuration {
  Visibility visibility = 1;
  // Additional per-direction visibility minimums when prevailing visibility
  // varies (e.g. "3300 350SW").
  repeated Visibility directional_visibility = 2;
  repeated Rvr rvr = 3;
  repeated PresentWeather present_weather = 4;
  repeated Cloud clouds = 5;
  // Vertical visibility ("VV..."), if reported.
  optional VerticalVisibility vertical_visibility = 6;
}

message Visibility {
  oneof value {
    // Visibility in meters (international form). Unset = "////".
    OptionalMeters meters = 1;
    // Visibility in statute miles (US form).
    StatuteMilesVisibility statute_miles = 2;
  }
  // Direction the prevailing visibility applies to, if specified.
  optional CardinalDirection direction = 3;
  // Whether "NDV" (no directional variation) was indicated.
  bool no_directional_variation = 4;
}

message OptionalMeters {
  optional uint32 value = 1;
}

message StatuteMilesVisibility {
  optional uint32 whole = 1;
  optional StatuteMilesFraction fraction = 2;
  optional DistanceModifier modifier = 3;
}

message StatuteMilesFraction {
  uint32 numerator = 1;
  uint32 denominator = 2;
}

enum DistanceModifier {
  DISTANCE_MODIFIER_UNSPECIFIED = 0;
  DISTANCE_MODIFIER_LESS_THAN = 1;     // "M" prefix
  DISTANCE_MODIFIER_GREATER_THAN = 2;  // "P" prefix
}

enum CardinalDirection {
  CARDINAL_DIRECTION_UNSPECIFIED = 0;
  CARDINAL_DIRECTION_N = 1;
  CARDINAL_DIRECTION_NE = 2;
  CARDINAL_DIRECTION_E = 3;
  CARDINAL_DIRECTION_SE = 4;
  CARDINAL_DIRECTION_S = 5;
  CARDINAL_DIRECTION_SW = 6;
  CARDINAL_DIRECTION_W = 7;
  CARDINAL_DIRECTION_NW = 8;
}

message Rvr {
  // Runway designator, e.g. "07", "28L".
  string runway = 1;
  // RVR value in meters. Unset = "////".
  optional uint32 meters = 2;
  optional DistanceModifier modifier = 3;
  optional VisibilityTrend trend = 4;
}

enum VisibilityTrend {
  VISIBILITY_TREND_UNSPECIFIED = 0;
  VISIBILITY_TREND_UPWARD = 1;
  VISIBILITY_TREND_NEUTRAL = 2;
  VISIBILITY_TREND_DOWNWARD = 3;
}

message VerticalVisibility {
  // Vertical visibility in hundreds of feet (e.g. 5 = 500 ft).
  // Unset = "VV///".
  optional uint32 hundreds_of_feet = 1;
}

message Cloud {
  oneof variant {
    // No cloud detected (automated stations).
    google.protobuf.Empty ncd = 1;
    // No significant clouds.
    google.protobuf.Empty nsc = 2;
    // Sky clear (US form).
    google.protobuf.Empty clr = 3;
    // A layer with coverage and (usually) height.
    CloudData data = 4;
  }
}

message CloudData {
  // Cloud coverage. Unset = "///" (coverage unknown).
  optional CloudCoverage coverage = 1;
  // Base height in hundreds of feet. Unset = "///" (height unknown).
  optional int32 height_hundreds_ft = 2;
  // Optional cloud-type modifier (TCU, CB). Outer optional = field absent.
  // Inner unset = "///" (modifier slot was reported but unreadable).
  optional CloudType cloud_type = 3;
}

enum CloudCoverage {
  CLOUD_COVERAGE_UNSPECIFIED = 0;
  CLOUD_COVERAGE_FEW = 1;
  CLOUD_COVERAGE_SCATTERED = 2;
  CLOUD_COVERAGE_BROKEN = 3;
  CLOUD_COVERAGE_OVERCAST = 4;
}

message CloudType {
  optional string known = 1;
}

message PresentWeather {
  optional WeatherIntensity intensity = 1;
  optional WeatherDescriptor descriptor = 2;
  repeated WeatherPhenomenonValue phenomena = 3;
}

enum WeatherIntensity {
  WEATHER_INTENSITY_UNSPECIFIED = 0;
  WEATHER_INTENSITY_LIGHT = 1;     // "-"
  WEATHER_INTENSITY_HEAVY = 2;     // "+"
  WEATHER_INTENSITY_VICINITY = 3;  // "VC"
}

enum WeatherDescriptor {
  WEATHER_DESCRIPTOR_UNSPECIFIED = 0;
  WEATHER_DESCRIPTOR_SHALLOW = 1;       // MI
  WEATHER_DESCRIPTOR_PATCHES = 2;       // BC
  WEATHER_DESCRIPTOR_PARTIAL = 3;       // PR
  WEATHER_DESCRIPTOR_LOW_DRIFTING = 4;  // DR
  WEATHER_DESCRIPTOR_BLOWING = 5;       // BL
  WEATHER_DESCRIPTOR_SHOWERS = 6;       // SH
  WEATHER_DESCRIPTOR_THUNDERSTORM = 7;  // TS
  WEATHER_DESCRIPTOR_FREEZING = 8;      // FZ
}

message WeatherPhenomenonValue {
  // Set = known code. Unset = "//" (slot present but phenomenon unreadable).
  optional WeatherPhenomenon code = 1;
}

enum WeatherPhenomenon {
  WEATHER_PHENOMENON_UNSPECIFIED = 0;

  // Precipitation
  WEATHER_PHENOMENON_DZ = 1;   // Drizzle
  WEATHER_PHENOMENON_RA = 2;   // Rain
  WEATHER_PHENOMENON_SN = 3;   // Snow
  WEATHER_PHENOMENON_SG = 4;   // Snow grains
  WEATHER_PHENOMENON_PL = 5;   // Ice pellets
  WEATHER_PHENOMENON_GR = 6;   // Hail
  WEATHER_PHENOMENON_GS = 7;   // Small hail / snow pellets
  WEATHER_PHENOMENON_UP = 8;   // Unknown precipitation

  // Obscuration
  WEATHER_PHENOMENON_BR = 9;   // Mist
  WEATHER_PHENOMENON_FG = 10;  // Fog
  WEATHER_PHENOMENON_FU = 11;  // Smoke
  WEATHER_PHENOMENON_VA = 12;  // Volcanic ash
  WEATHER_PHENOMENON_DU = 13;  // Widespread dust
  WEATHER_PHENOMENON_SA = 14;  // Sand
  WEATHER_PHENOMENON_HZ = 15;  // Haze

  // Other
  WEATHER_PHENOMENON_PO = 16;  // Dust/sand whirls
  WEATHER_PHENOMENON_SQ = 17;  // Squall
  WEATHER_PHENOMENON_FC = 18;  // Funnel cloud / tornado / waterspout
  WEATHER_PHENOMENON_SS = 19;  // Sandstorm
  WEATHER_PHENOMENON_DS = 20;  // Duststorm
}

// ─── Temperature ─────────────────────────────────────────────────────────────

message Temperature {
  // Temperature in °C. Unset = "//".
  optional sint32 celsius = 1;
  // Dew point in °C. Unset = "//".
  optional sint32 dew_point_celsius = 2;
}

// ─── Pressure ────────────────────────────────────────────────────────────────

message Pressure {
  // QNH reading (the "Q...." form), if present.
  optional PressureReading qnh = 1;
  // Altimeter reading (the "A...." form), if present.
  optional PressureReading altimeter = 2;
}

message PressureReading {
  PressureUnit unit = 1;
  // Value in the unit's natural integer form:
  //   HPA       → hectopascals (e.g. 1013)
  //   INHG_HUNDREDTHS → hundredths of inHg (e.g. 2992 means 29.92 inHg)
  // Unset = "////".
  optional uint32 value = 2;
}

enum PressureUnit {
  PRESSURE_UNIT_UNSPECIFIED = 0;
  PRESSURE_UNIT_HPA = 1;
  PRESSURE_UNIT_INHG_HUNDREDTHS = 2;
}
